<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeWatch</title>
    <link rel="icon" href="../assets/icon.png" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
<main class="app-shell">
    <header class="topbar">
        <div class="brand-lockup">
            <img class="brand-mark" src="../assets/icon.png" alt="" aria-hidden="true" />
            <h1>WeWatch</h1>
            <p id="sessionSummary">Offline</p>
        </div>

        <div class="topbar-actions">
            <div class="status-cluster" aria-label="Connection status">
                <span id="serverBadge" class="badge">Server off</span>
                <span id="socketBadge" class="badge">Socket off</span>
                <span id="vlcBadge" class="badge">VLC off</span>
            </div>

            <div class="app-controls">
                <span id="versionBadge" class="version-pill">v...</span>
                <button id="checkUpdateButton" class="update-button" type="button">Check update</button>
                <button id="installUpdateButton" class="update-button update-install" type="button" hidden>Restart to update</button>
                <button id="themeToggle" class="theme-switch" type="button" aria-label="Switch to light theme">
                    <span class="theme-icon sun" aria-hidden="true">☀</span>
                    <span class="theme-knob" aria-hidden="true"></span>
                    <span class="theme-icon moon" aria-hidden="true">☾</span>
                </button>
                <details id="appearanceMenu" class="appearance-menu">
                    <summary class="appearance-trigger">Colors</summary>
                    <div class="appearance-popover" role="group" aria-label="Color scheme">
                        <div class="appearance-section">
                            <span class="appearance-label">Scheme</span>
                            <div class="scheme-grid" role="radiogroup" aria-label="Preset color schemes">
                                <button class="scheme-option" type="button" data-scheme="aurora" aria-pressed="true">
                                    <span class="scheme-swatch aurora" aria-hidden="true"></span>
                                    Aurora
                                </button>
                                <button class="scheme-option" type="button" data-scheme="ember" aria-pressed="false">
                                    <span class="scheme-swatch ember" aria-hidden="true"></span>
                                    Ember
                                </button>
                                <button class="scheme-option" type="button" data-scheme="forest" aria-pressed="false">
                                    <span class="scheme-swatch forest" aria-hidden="true"></span>
                                    Forest
                                </button>
                                <button class="scheme-option" type="button" data-scheme="neon" aria-pressed="false">
                                    <span class="scheme-swatch neon" aria-hidden="true"></span>
                                    Neon
                                </button>
                            </div>
                        </div>

                        <div class="appearance-section">
                            <span class="appearance-label">Custom colors</span>
                            <div class="custom-color-grid">
                                <label>
                                    Accent
                                    <input id="customPrimary" type="color" value="#6ee7d8" />
                                </label>
                                <label>
                                    Glow
                                    <input id="customSecondary" type="color" value="#8f7dff" />
                                </label>
                                <label>
                                    Warmth
                                    <input id="customTertiary" type="color" value="#ff8b6e" />
                                </label>
                            </div>
                            <button id="resetSchemeButton" class="subtle-button" type="button">Reset colors</button>
                        </div>
                    </div>
                </details>
            </div>
        </div>
    </header>

    <section class="layout">
        <aside class="panel setup-panel">
            <div class="panel-heading">
                <h2>Connection</h2>
                <span id="rolePill" class="soft-pill">Offline</span>
            </div>

            <div class="field">
                <label for="userName">Name</label>
                <input id="userName" autocomplete="off" placeholder="Your name" />
            </div>

            <div class="field">
                <label for="serverUrl">Host IP address</label>
                <div class="input-action">
                    <input id="serverUrl" autocomplete="off" placeholder="100.71.245.69" />
                    <button id="copyServerUrlButton" type="button">Copy</button>
                </div>
            </div>

            <div class="field">
                <label for="serverPort">Port</label>
                <input id="serverPort" type="number" min="1024" max="65535" value="3000" />
            </div>

            <div class="connection-actions">
                <button id="hostMode" class="primary" type="button">
                    <span>Start hosting</span>
                </button>

                <button id="friendMode" type="button">
                    <span>Join host</span>
                </button>

                <button id="disconnectButton" type="button">
                    Disconnect
                </button>
            </div>

            <hr />

            <div class="panel-heading compact">
                <h2>VLC</h2>
            </div>

            <div class="field two">
                <div>
                    <label for="vlcHost">VLC host</label>
                    <input id="vlcHost" autocomplete="off" value="127.0.0.1" />
                </div>

                <div>
                    <label for="vlcPort">VLC port</label>
                    <input id="vlcPort" type="number" min="1" max="65535" value="8080" />
                </div>
            </div>

            <div class="field">
                <label for="vlcPassword">VLC password</label>
                <input id="vlcPassword" type="password" autocomplete="off" value="1234" />
            </div>

            <label class="check-row">
                <input id="autoFollow" type="checkbox" checked />
                <span>Auto sync to host</span>
            </label>

            <div class="button-row">
                <button id="launchVlcButton" type="button">Launch VLC</button>
                <button id="checkVlcButton" type="button">Check VLC</button>
            </div>

        </aside>

        <section class="main-panel">
            <section class="player-panel">
                <div class="now-row">
                    <div class="media-title">
                        <span class="eyebrow">Now playing</span>
                        <h2 id="fileName" tabindex="0">No media</h2>
                        <p id="mediaMeta">00:00 / 00:00</p>
                    </div>
                </div>

                <div class="last-played" style="margin-top: 0.5rem; font-size: 0.85em; color: var(--text-muted);">
                    <span class="eyebrow" style="font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.7;">Last played</span>
                    <p id="lastPlayedInfo" style="margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Nothing</p>
                </div>

                <div class="progress-wrap">
                    <input id="seekSlider" type="range" min="0" max="1" step="1" value="0" />

                    <div class="time-row">
                        <span id="currentTime">00:00</span>
                        <span id="durationTime">00:00</span>
                    </div>
                </div>

                <div class="transport">
                    <button id="playButton" class="primary" type="button">Play</button>
                    <button id="pauseButton" type="button">Pause</button>
                    <button id="seekButton" type="button">Seek</button>
                    <button id="syncButton" type="button">Sync</button>
                </div>
            </section>

            <div class="grid">
                <section class="mini-panel">
                    <h3>Session</h3>

                    <dl>
                        <div>
                            <dt>Role</dt>
                            <dd id="roleValue">-</dd>
                        </div>

                        <div>
                            <dt>Host</dt>
                            <dd id="hostValue">-</dd>
                        </div>

                        <div>
                            <dt>Drift</dt>
                            <dd id="driftValue">-</dd>
                        </div>
                    </dl>
                </section>

                <section class="mini-panel">
                    <h3>People</h3>
                    <div id="peopleList" class="people-list"></div>
                </section>

            </div>

            <section class="event-log activity-panel" aria-label="Session activity">
                <div class="log-heading activity-heading">
                    <h3>Activity</h3>
                    <div class="tab-toggle" role="tablist" aria-label="Activity views">
                        <button id="eventsTab" class="tab-button is-active" type="button" role="tab" aria-selected="true" aria-controls="eventsPane">Events</button>
                        <button id="chatTab" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="chatPane">Chats</button>
                    </div>
                </div>

                <div id="eventsPane" class="activity-pane is-active" role="tabpanel" aria-labelledby="eventsTab">
                    <div id="eventLog"></div>
                </div>

                <div id="chatPane" class="activity-pane chat-pane" role="tabpanel" aria-labelledby="chatTab" hidden>
                    <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
                    <form id="chatForm" class="chat-form">
                        <input id="chatInput" autocomplete="off" maxlength="500" placeholder="Connect to chat" disabled />
                        <button id="chatSendButton" type="submit" disabled>Send</button>
                    </form>
                </div>
            </section>

        </section>

    </section>

    <footer class="app-footer">Made with ❤️ by Natu</footer>
</main>

<!-- IMPORTANT: module for imports -->
<script type="module" src="./renderer.js"></script>
</body>
</html>
